name: Bug report
description: Report a problem with Inferno so we can fix it.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Inferno. Please fill in as much as you can so we can reproduce the issue quickly.
  - type: input
    id: page
    attributes:
      label: Page or section
      description: Where did this happen? (for example Board, Tasks, Campfire, War Room, Settings)
      placeholder: Board
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and device
      description: Which browser and device were you using?
      placeholder: Chrome 120 on Windows 11 desktop
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, step by step, right before the problem?
      placeholder: |
        1. Go to the Board page
        2. Drag a task from Backlog to In Progress
        3. See the error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: What actually happened instead?
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: If you can, drag and drop a screenshot or screen recording here. Optional but very helpful.
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this affect your work?
      options:
        - Low (minor annoyance, easy workaround)
        - Medium (feature partly broken)
        - High (feature unusable)
        - Critical (data loss or cannot use the app)
    validations:
      required: true
